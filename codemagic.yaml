workflows:
  ios-distribution:
    name: iOS TestFlight Distribution
    max_build_duration: 60
    environment:
      groups:
        - reclaim
      ios_signing:
        provisioning_profiles:
          - reclaim_app_store
          - reclaim_device_activity
          - reclaim_shield_config
          - reclaim_panic_timer_widget
      vars:
        XCODE_WORKSPACE: "ios/reclaimapp.xcworkspace"
        XCODE_SCHEME: "reclaimapp"
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Create .env file
        script: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env
          echo "EXPO_PUBLIC_GROQ_API_KEY=$EXPO_PUBLIC_GROQ_API_KEY" >> .env
          echo "EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY" >> .env
      - name: Install npm dependencies
        script: npm install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set Xcode project to manual signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/reclaimapp.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=6W846KW4B3 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            2>&1 | tee /Users/builder/clone/build_full.log; exit ${PIPESTATUS[0]}
    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/clone/build_full.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
