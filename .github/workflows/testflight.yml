name: Build and Upload to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profiles
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BUILD_PROVISION_PROFILE_TUNNEL_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_TUNNEL_BASE64 }}
          BUILD_PROVISION_PROFILE_SHIELDCONFIG_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_SHIELDCONFIG_BASE64 }}
          BUILD_PROVISION_PROFILE_DEVICEACTIVITY_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_DEVICEACTIVITY_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/main.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_TUNNEL_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/tunnel.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_SHIELDCONFIG_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/shieldconfig.mobileprovision
          echo "$BUILD_PROVISION_PROFILE_DEVICEACTIVITY_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/deviceactivity.mobileprovision

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Symlink node for build scripts
        run: |
          NODE_PATH=$(which node)
          sudo ln -sf "$NODE_PATH" /usr/local/bin/node

      - name: Install dependencies
        env:
          CI: true
        run: npm install

      - name: Install Pods
        run: |
          sudo gem install xcodeproj --pre
          sudo gem install cocoapods
          cd ios
          pod install

      - name: Build Archive
        run: |
          cd ios
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 5" reclaimapp/Info.plist
          xcodebuild -workspace reclaimapp.xcworkspace \
            -scheme reclaimapp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/reclaimapp.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CLANG_WARN_NULLABILITY_COMPLETENESS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CODE_SIGN_IDENTITY="Apple Distribution: Abdul rehman Khan (6W846KW4B3)" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \

      - name: Export IPA
        run: |
          cat << EOF > $RUNNER_TEMP/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.reclaim.recovery</key>
              <string>f8fee1c5-0ef0-4877-b95a-f02e31d1809e</string>
              <key>com.reclaim.recovery.ReclaimTunnel</key>
              <string>b9d0158d-6ccb-4c83-8bc4-5c30201c7c7c</string>
              <key>com.reclaim.recovery.ReclaimShieldConfig</key>
              <string>2bf19260-6079-4832-9568-ce6f1b206573</string>
              <key>com.reclaim.recovery.ReclaimDeviceActivity</key>
              <string>fbd6d5a9-2b35-4084-8376-5c165b20ba70</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/reclaimapp.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/reclaimapp.ipa \
            -t ios \
            -u "$APPLE_ID" \
            -p "$APPLE_APP_PASSWORD" \
            --verbose
